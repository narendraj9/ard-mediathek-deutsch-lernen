<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 480px;
      margin: 20px auto;
      padding: 0 16px;
      color: #1a1a1a;
      font-size: 14px;
    }
    h2 { margin: 0 0 16px; font-size: 18px; }
    label { display: block; font-weight: 600; margin: 12px 0 4px; }
    select, input[type="text"], input[type="number"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .hint { color: #666; font-size: 12px; margin-top: 4px; }
    button {
      margin-top: 16px;
      padding: 8px 20px;
      background: #0060df;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #003eaa; }
    .status {
      margin-top: 8px;
      color: #058b00;
      font-size: 13px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h2>Bilingual ARD Settings</h2>

  <label for="provider">Provider</label>
  <select id="provider">
    <option value="cerebras">Cerebras</option>
    <option value="groq">Groq</option>
  </select>

  <label for="api-key">API Key</label>
  <input type="text" id="api-key" placeholder="Enter API key..." />
  <div class="hint" id="hint"></div>

  <hr style="margin: 20px 0; border: none; border-top: 1px solid #ddd;">

  <label for="subtitle-font-size">Subtitle translation font size (px)</label>
  <input type="number" id="subtitle-font-size" min="10" max="48" value="22" />

  <label for="overlay-font-size">Vocabulary overlay font size (px)</label>
  <input type="number" id="overlay-font-size" min="8" max="32" value="14" />

  <button id="save">Save</button>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
